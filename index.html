<!DOCTYPE html>
<html>
<head>
    <title>For Someone Special ❤️</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #ff6ec4, #7873f5);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        h1 {
            font-size: 34px;
            margin-bottom: 20px;
        }

        #btn {
            padding: 12px 28px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: #ff4b5c;
            color: white;
            cursor: pointer;
        }

        #container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 1.5s ease;
        }

        #photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
            transition: opacity 0.5s ease;
        }

        #rabbit {
            font-size: 70px;
        }

        #bubble {
            background: white;
            color: #333;
            padding: 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 17px;
            width: 280px;
            min-height: 60px;
        }

        .particle {
            position: absolute;
            bottom: -20px;
            font-size: 20px;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

<h1 id="name"></h1>

<button id="btn" onclick="startLove()">Click Me 😊</button>

<div id="container">
    <img id="photo" src="" alt="Her Photo">
    <div id="rabbit">🐰</div>
    <div id="bubble"></div>
</div>

<script>
    document.getElementById("name").innerHTML =
        "Out of all people… you’re my favorite notification ❤️ <br> Manasi Gadekar";

    const messages = [
        "Hey... I’ve been meaning to tell you something 😊",
        "I know I annoy you sometimes 😅 but my intentions are always good 💖",
        "You actually make my day better ❤️",
        "And yeah… I enjoy talking to you a little too much 😊"
    ];

    // 👇 ONE PHOTO PER MESSAGE (same order)
    const photos = [
        "photo1.jpg",
        "photo2.jpg",
        "photo3.jpg",
        "photo4.jpg"
    ];

    let msgIndex = 0;
    let charIndex = 0;

    function startLove() {
        document.getElementById("container").style.display = "block";
        document.getElementById("btn").style.display = "none";
        updatePhoto();
        typeMessage();
    }

    function updatePhoto() {
        const photo = document.getElementById("photo");
        photo.style.opacity = 0;

        setTimeout(() => {
            photo.src = photos[msgIndex];
            photo.style.opacity = 1;
        }, 300);
    }

    function typeMessage() {
        const bubble = document.getElementById("bubble");

        if (charIndex < messages[msgIndex].length) {
            bubble.innerHTML += messages[msgIndex].charAt(charIndex);
            charIndex++;
            setTimeout(typeMessage, 40);
        } else {
            setTimeout(nextMessage, 1800);
        }
    }

    function nextMessage() {
        msgIndex++;
        charIndex = 0;

        if (msgIndex < messages.length) {
            document.getElementById("bubble").innerHTML = "";
            updatePhoto();
            setTimeout(typeMessage, 300);
        }
    }

    function createParticles() {
        const symbols = ["❤️", "🌹"];
        const particle = document.createElement("div");
        particle.classList.add("particle");
        particle.innerText = symbols[Math.floor(Math.random() * symbols.length)];

        particle.style.left = Math.random() * 100 + "vw";
        particle.style.animationDuration = (3 + Math.random() * 5) + "s";

        document.body.appendChild(particle);

        setTimeout(() => particle.remove(), 8000);
    }

    setInterval(createParticles, 300);
</script>

</body>
</html>
